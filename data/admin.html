<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Billiard | Admin Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #060e07; --bg-card: #0d1f0f; --bg-panel: #091208; --felt-green: #1a4a2e;
      --wood-dark: #3d2214; --gold: #d4a843; --copper: #b87333; --text-primary: #f5edd6;
      --text-secondary: #9aaf8a; --border: #1f3520;
      --free: #22c55e; --busy: #ef4444; --booked: #f59e0b; --vip: #3b82f6; --warning: #f97316;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg-deep); font-family: 'Inter', sans-serif; color: var(--text-primary); min-height: 100vh; overflow-x: hidden; }
    header {
      padding: 15px 30px; display: flex; justify-content: space-between; align-items: center;
      background: linear-gradient(180deg, #1c1108 0%, #3d2214 100%);
      border-bottom: 2px solid var(--gold); box-shadow: 0 5px 25px rgba(0,0,0,0.6);
    }
    .logo { display: flex; align-items: center; gap: 12px; font-family: 'Oswald', sans-serif; font-size: 1.8rem; color: var(--gold); }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 20px; }
    .stat-card { background: var(--bg-card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
    .stat-val { font-size: 1.5rem; font-weight: bold; color: var(--gold); margin-top: 5px; font-family: 'JetBrains Mono', monospace; }

    /* FLOOR MAP */
    .floor-map { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 0 20px 20px; }
    .table-card {
      background: var(--bg-card); 
      border: 2px solid var(--border); 
      border-radius: 16px; 
      padding: 20px;
      cursor: pointer; 
      transition: 0.3s; 
      position: relative; 
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }
    .table-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    
    .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .status-badge { 
      padding: 4px 12px; 
      border-radius: 20px; 
      font-size: 11px; 
      font-weight: bold; 
      text-transform: uppercase; 
      letter-spacing: 1px;
    }
    
    .table-summary { 
      margin: 10px 0; 
      padding: 14px 12px; 
      border-radius: 10px; 
      background: rgba(255,255,255,0.03); 
      border: 1px solid rgba(255,255,255,0.06); 
      text-align: center; 
      color: var(--text-secondary);
      font-size: 0.85rem;
    }
    
    .table-timer { 
      font-family: 'JetBrains Mono', monospace; 
      font-size: 1.6rem; 
      text-align: center; 
      color: var(--gold); 
      margin: 10px 0;
      text-shadow: 0 0 10px rgba(212,168,67,0.3);
    }
    .table-amount { text-align: center; font-size: 1rem; color: var(--text-primary); font-weight: bold; }

    /* STATUS COLORS & GLOWS */
    .status-free { border-color: var(--free); box-shadow: 0 0 15px rgba(34, 197, 94, 0.1); } 
    .status-free .status-badge { background: var(--free); color: #000; box-shadow: 0 0 10px var(--free); }
    
    .status-busy { border-color: var(--busy); box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); } 
    .status-busy .status-badge { background: var(--busy); color: #fff; box-shadow: 0 0 10px var(--busy); }
    .status-busy .table-timer { color: var(--busy); text-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }

    .status-vip { border-color: var(--vip); box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); } 
    .status-vip .status-badge { background: var(--vip); color: #fff; box-shadow: 0 0 10px var(--vip); }

    /* MODAL */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; }
    .modal-content { background: var(--bg-panel); width: 450px; border-radius: 20px; border: 2px solid var(--gold); padding: 25px; box-shadow: 0 0 50px rgba(212,168,67,0.2); }
    .m-header { font-size: 1.5rem; color: var(--gold); margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
    .m-body { display: flex; flex-direction: column; gap: 15px; }
    .btn { padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn-gold { background: var(--gold); color: #000; }
    .btn-red { background: var(--busy); color: #fff; }

    /* TABS */
    .tabs-section { padding: 0 20px; margin-top: 20px; }
    .tabs-header { display: flex; gap: 10px; margin-bottom: 15px; }
    .tab-btn { padding: 10px 20px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary); cursor: pointer; border-radius: 8px; }
    .tab-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }
    .log-box { height: 250px; overflow-y: auto; background: #050a06; padding: 15px; border-radius: 12px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }
    .log-entry { margin-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 3px 0; }
  </style>
</head>
<body>
  <header>
    <div class="logo">🎱 SMART BILLIARD <span style="font-size: 0.6em; background: var(--gold); color:#000; padding:2px 6px; border-radius:4px; margin-left:10px;">ADMIN</span></div>
    <div style="display:flex; gap:20px; align-items:center;">
        <div id="clock" style="font-family:'JetBrains Mono'; color:var(--gold);">14:23</div>
        <div id="wifi-ip" style="font-size:0.8rem; color:var(--text-secondary);">IP: 10.13.37.2</div>
    </div>
  </header>

  <div class="stats-row">
    <div class="stat-card"><div>Bugungi tushum</div><div class="stat-val" id="daily-revenue">0 so'm</div></div>
    <div class="stat-card"><div>Aktiv stollar</div><div class="stat-val" id="active-tables">0 / 9</div></div>
    <div class="stat-card"><div>Yangi buyurtmalar</div><div class="stat-val" id="new-orders" style="color:var(--warning);">0</div></div>
    <div class="stat-card"><div>Uptime</div><div class="stat-val" id="uptime">00:00:00</div></div>
  </div>

  <div class="floor-map" id="floor-map">
    <!-- 9 ta stol JS orqali -->
  </div>

  <div class="tabs-section">
    <div class="tabs-header">
        <button class="tab-btn active">Oxirgi amallar</button>
        <button class="tab-btn">Buyurtmalar</button>
        <button class="tab-btn">Tariflar</button>
    </div>
    <div class="log-box" id="logs">
        <!-- Loglar -->
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal" id="table-modal">
    <div class="modal-content">
        <div class="m-header" id="m-title">Stol #1</div>
        <div class="m-body">
            <button class="btn btn-gold" onclick="apiCall('start', 1)">▶ O'yinni boshlash (VIP)</button>
            <button class="btn btn-gold" style="background:#888" onclick="apiCall('start_hourly', 1)">⏱ Soatlik rejim</button>
            <button class="btn btn-red" onclick="apiCall('stop', 1)">🛑 O'yinni tugatish</button>
            <button class="btn" style="background:var(--booked)" onclick="apiCall('book', 1)">📅 Bron qilish (60 m)</button>
            <button class="btn" style="background:#444" onclick="closeModal()">Yopish</button>
        </div>
    </div>
  </div>

  <script>
    let currentTable = 1;
    const ws = new WebSocket(`ws://${location.host}/ws`);
    
    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        renderMap(data.tables);
        renderLogs(data.logs);
        document.getElementById('daily-revenue').innerText = formatMoney(data.daily_revenue);
        document.getElementById('active-tables').innerText = data.active_tables + " / 9";
        document.getElementById('new-orders').innerText = data.orders.filter(o => o.status === 'new').length;
        document.getElementById('uptime').innerText = data.uptime_display;
        document.getElementById('clock').innerText = data.clock;
    };

    function renderMap(tables) {
        const map = document.getElementById('floor-map');
        map.innerHTML = '';
        tables.forEach(t => {
            const card = document.createElement('div');
            card.className = `table-card status-${t.status}`;
            card.onclick = () => openModal(t.id);
            card.innerHTML = `
                <div class="table-header">
                    <span style="font-weight:bold;">STOL ${t.id}</span>
                    <span class="status-badge">${t.status}</span>
                </div>
                <div class="table-summary">Real vaqt holati paneli</div>
                <div class="table-timer">${t.elapsed_display}</div>
                <div class="table-amount">${formatMoney(t.total_due)}</div>
            `;
            map.appendChild(card);
        });
    }

    function renderLogs(logs) {
        const box = document.getElementById('logs');
        box.innerHTML = logs.map(l => `<div class="log-entry">${l}</div>`).reverse().join('');
    }

    function formatMoney(n) { return new Intl.NumberFormat('uz-UZ').format(n) + " so'm"; }
    function openModal(id) { currentTable = id; document.getElementById('m-title').innerText = "Stol #" + id; document.getElementById('table-modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('table-modal').style.display = 'none'; }
    
    function apiCall(cmd, id) {
        let url = '';
        if (cmd === 'start') url = `/start?t=${currentTable}&mode=vip`;
        if (cmd === 'start_hourly') url = `/start?t=${currentTable}&mode=hourly&h=1`;
        if (cmd === 'stop') url = `/stop?t=${currentTable}&payment=cash`;
        if (cmd === 'book') url = `/book?t=${currentTable}&minutes=60`;
        fetch(url).then(() => closeModal());
    }
  </script>
</body>
</html>
